<!DOCTYPE html>
<html lang="en">

<head>
    {{> title-meta title="404" }}

    {{> head-css}}
</head>

<body>

    {{> navbar }}

    <section class="relative lg:py-50 py-25">
        <div class="container max-w-160! relative z-10">
            <div class="rounded-2xl p-5 bg-default-200 inset-shadow border border-default-200">
                <div class="bg-white rounded-lg p-6 text-center space-y-6">

                    <div class="inline-flex py-1.5 px-2.5 rounded items-center justify-center gap-2 inset-shadow">
                        <i class="iconify custom-arrow-left size-2.5"></i>
                        <div class="font-semibold text-xs/none uppercase tracking-widest">Something went wrong</div>
                        <i class="iconify custom-arrow-right size-2.5"></i>
                    </div>

                    <h2 class="lg:text-7xl text-4xl">404</h2>

                    <h3 class="text-2xl">Page not found</h3>

                    <p class="text-default-600 max-w-67 mx-auto">The page you are looking for doesn't exist or has been moved.</p>

                    <a href="index.html" class="py-2.5 px-5.5 inline-flex items-center justify-center rounded-lg bg-primary shadow-primary-soft text-white font-medium transition-all duration-500 hover:bg-primary-hover">
                        Back to Home
                    </a>
                </div>
            </div>
        </div>

        <div class="absolute size-275 
            inset-[-800px_0%_auto]
            animate-[spin_100s_linear_infinite]
            flex items-center justify-center mx-auto
            rounded-full p-2.5 bg-default-100
            inset-shadow">
            <div class="border border-white rounded-full size-full"></div>
        </div>
    </section>

    {{> footer }}

</body>

</html>
